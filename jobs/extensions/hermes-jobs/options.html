<!DOCTYPE html>
<html><head><style>
body { background:#1a1a2e; color:#fff; font-family:system-ui; padding:20px; max-width:600px; margin:0 auto; }
h1 { font-size:20px; margin-bottom:20px; }
.section { background:rgba(255,255,255,0.05); border-radius:12px; padding:16px; margin-bottom:16px; }
.section h2 { font-size:14px; color:#aaa; margin-bottom:12px; }
label { display:block; font-size:13px; margin-bottom:6px; color:#ccc; }
input[type="text"], input[type="number"], select { width:100%; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; font-size:13px; margin-bottom:12px; }
input[type="checkbox"] { margin-right:8px; }
.row { display:flex; gap:12px; }
.row .col { flex:1; }
.toggle { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.toggle:last-child { border-bottom:none; }
.btn { background:#4ade80; color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; font-size:13px; }
.btn:hover { background:#22c55e; }
.msg { padding:10px; border-radius:8px; margin-top:12px; font-size:13px; display:none; }
.msg.ok { background:rgba(74,222,128,0.2); color:#4ade80; display:block; }
</style></head><body>
<h1>&#9881; Hermes Job Agent Settings</h1>

<div class="section">
  <h2>VPS Connection</h2>
  <label>VPS URL</label>
  <input type="text" id="vps-url" value="https://76.13.99.138">
  <label>API Token</label>
  <input type="text" id="api-token" placeholder="Optional">
</div>

<div class="section">
  <h2>Application Settings</h2>
  <div class="toggle">
    <label>Auto-apply to jobs scoring 8+</label>
    <input type="checkbox" id="auto-apply">
  </div>
  div class="toggle">
    <label>Auto-tailor resume on job detect</label>
    <input type="checkbox" id="auto-tailor" checked>
  </div>
  <div class="toggle">
    <label>Daily job discovery sweep</label>
    <input type="checkbox" id="daily-sweep" checked>
  </div>
  <div class="row">
    <div class="col">
      <label>Min salary ($/hr)</label>
      <input type="number" id="min-salary" value="17">
    </div>
    <div class="col">
      <label>Max applications/day</label>
      <input type="number" id="max-apps" value="20">
    </div>
  </div>
</div>

<div class="section">
  <h2>Target Jobs</h2>
  <label>Job titles / keywords</label>
  <input type="text" id="keywords" value="Security Officer, Correctional Officer, Overnight Manager">
  <label>Locations</label>
  <input type="text" id="locations" value="Tallahassee FL, Florida, Remote">
</div>

<button class="btn" id="save">Save Settings</button>
<div class="msg" id="msg"></div>

<script src="options.js"></script>
</body></html>
