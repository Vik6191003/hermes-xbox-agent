<!DOCTYPE html>
<html><head><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:380px; background:linear-gradient(135deg,#1a1a2e,#16213e); font-family:system-ui,sans-serif; color:#fff; }
.header { padding:16px; background:rgba(255,255,255,0.05); border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:10px; }
.header span { font-size:24px; }
.header h1 { font-size:16px; font-weight:700; }
.header p { font-size:11px; color:#aaa; }
.stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:12px; }
.stat { background:rgba(255,255,255,0.05); border-radius:10px; padding:10px; text-align:center; }
.stat .num { font-size:22px; font-weight:700; color:#4ade80; }
.stat .label { font-size:10px; color:#aaa; margin-top:2px; }
.section { padding:12px; border-bottom:1px solid rgba(255,255,255,0.05); }
.section h2 { font-size:12px; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.job-item { background:rgba(255,255,255,0.05); border-radius:8px; padding:10px; margin-bottom:6px; }
.job-item .title { font-size:13px; font-weight:600; }
.job-item .company { font-size:11px; color:#aaa; }
.job-item .status { display:inline-block; font-size:10px; padding:2px 8px; border-radius:12px; margin-top:4px; }
.status.saved { background:#3b82f6; }
.status.applied { background:#4ade80; color:#000; }
.status.interview { background:#f97316; }
.status.offer { background:#22c55e; }
.actions { padding:12px; display:flex; flex-direction:column; gap:8px; }
.btn { width:100%; padding:10px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-primary { background:#4ade80; color:#000; }
.btn-primary:hover { background:#22c55e; }
.btn-secondary { background:rgba(255,255,255,0.1); color:#fff; }
.btn-secondary:hover { background:rgba(255,255,255,0.2); }
.footer { padding:10px; text-align:center; font-size:10px; color:#555; }
</style></head><body>

<div class="header">
  <span>&#128640;</span>
  <div><h1>Hermes Job Agent</h1><p>Autonomous job pipeline</p></div>
</div>

<div class="stats">
  <div class="stat"><div class="num" id="stat-saved">0</div><div class="label">Saved</div></div>
  <div class="stat"><div class="num" id="stat-applied">0</div><div class="label">Applied</div></div>
  <div class="stat"><div class="num" id="stat-response">0</div><div class="label">Responses</div></div>
</div>

<div class="section">
  <h2>Recent Jobs</h2>
  <div id="recent-jobs"><p style="font-size:12px;color:#555;padding:8px;">No jobs yet. Browse to a job posting.</p></div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="btn-apply">&#63743; Auto-Apply Top Job</button>
  <button class="btn btn-secondary" id="btn-refresh">&#128260; Refresh Pipeline</button>
  <button class="btn btn-secondary" id="btn-search">&#128269; Search New Jobs</button>
</div>

<div class="footer">Hermes Job Agent v1.0 | VPS: connected</div>

<script src="popup.js"></script>
</body></html>
